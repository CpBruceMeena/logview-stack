server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/log/positions.yaml

clients:
  - url: http://victorialogs:9428/insert/loki/api/v1/push
    # VictoriaLogs expects Loki v1 format
    tenant_id: 0

scrape_configs:
  - job_name: backend-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: backend
          __path__: /var/log/backend/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            _msg: message
            service: service
      - labels:
          level:
          service: