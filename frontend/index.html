<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogView - Contact</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1.5rem;
      padding: 3rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    }
    h1 {
      color: #fff;
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input, textarea {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 0.75rem;
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-size: 1rem;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #6c63ff;
      background: rgba(255, 255, 255, 0.1);
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    button {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 0.75rem;
      background: linear-gradient(135deg, #6c63ff, #a855f7);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
    }
    button:hover { transform: translateY(-1px); opacity: 0.92; }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #result {
      margin-top: 1.5rem;
      padding: 0.85rem 1rem;
      border-radius: 0.75rem;
      font-size: 0.95rem;
      display: none;
    }
    #result.success {
      display: block;
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }
    #result.error {
      display: block;
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>✉️ Contact</h1>
    <p class="subtitle">We'll get back to you — every message is logged via VictoriaLogs.</p>

    <form id="contactForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Your message..." required></textarea>
      </div>
      <button type="submit" id="submitBtn">Submit</button>
    </form>

    <div id="result"></div>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const btn = document.getElementById('submitBtn');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      result.className = '';
      result.style.display = 'none';

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Sending...';

      const data = new URLSearchParams();
      data.append('name', document.getElementById('name').value);
      data.append('email', document.getElementById('email').value);
      data.append('message', document.getElementById('message').value);

      try {
        const res = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: data,
        });
        const json = await res.json();

        if (res.ok) {
          result.className = 'success';
          result.textContent = `✅ Submitted! (ID: ${json.id})`;
          form.reset();
        } else {
          result.className = 'error';
          result.textContent = `❌ ${json.error || 'Something went wrong'}`;
        }
      } catch (err) {
        result.className = 'error';
        result.textContent = `❌ Network error: ${err.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Submit';
        result.style.display = 'block';
      }
    });
  </script>
</body>
</html>
